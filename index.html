<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIMS – Stock Inventory</title>
    <!-- Font Awesome for icons (CDN) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2A9D8F 0%, #E76F51 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* floating shapes (same as auth pages) */
        .floating-shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            pointer-events: none;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            right: -150px;
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 70%);
            animation: float1 20s ease-in-out infinite;
        }

        .shape-2 {
            width: 400px;
            height: 400px;
            bottom: -200px;
            left: -200px;
            background: radial-gradient(circle, rgba(255,255,255,0.15) 0%, transparent 70%);
            animation: float2 25s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, 30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(-30px, -30px) rotate(-120deg); }
            66% { transform: translate(20px, -20px) rotate(-240deg); }
        }

        .splash-container {
            text-align: center;
            z-index: 10;
            animation: fadeInUp 1s ease-out;
            cursor: pointer;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-wrapper {
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
            border: 3px solid rgba(255,255,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: logoFloat 3s ease-in-out infinite;
        }

        .logo-wrapper i {
            font-size: 70px;
            color: white;
            filter: drop-shadow(0 10px 15px rgba(0,0,0,0.2));
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        h1 {
            font-size: 58px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #f0f0f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .tagline {
            color: rgba(255,255,255,0.9);
            font-size: 18px;
            font-weight: 400;
            margin-bottom: 35px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Facebook-style loader (matches SIMS loading overlay) */
        .facebook-loader {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .facebook-loader div {
            width: 16px;
            height: 16px;
            background: white;
            border-radius: 50%;
            animation: facebookLoader 1.2s ease-in-out infinite;
            box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }

        .facebook-loader div:nth-child(2) {
            animation-delay: 0.2s;
            background: rgba(255,255,255,0.9);
        }

        .facebook-loader div:nth-child(3) {
            animation-delay: 0.4s;
            background: rgba(255,255,255,0.8);
        }

        @keyframes facebookLoader {
            0%, 100% {
                transform: scale(0.5);
                opacity: 0.3;
                box-shadow: 0 0 10px rgba(255,255,255,0.2);
            }
            50% {
                transform: scale(1.2);
                opacity: 1;
                box-shadow: 0 0 30px rgba(255,255,255,0.8);
            }
        }

        .loading-text {
            color: white;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .hint {
            margin-top: 30px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }

        /* responsive */
        @media (max-width: 480px) {
            .logo-wrapper {
                width: 90px;
                height: 90px;
            }
            .logo-wrapper i {
                font-size: 50px;
            }
            h1 {
                font-size: 42px;
            }
            .tagline {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- floating background shapes (same as login page) -->
    <div class="floating-shape shape-1"></div>
    <div class="floating-shape shape-2"></div>

    <!-- main splash content (click to skip) -->
    <div class="splash-container" id="splashContainer">
        <div class="logo-wrapper">
            <i class="fas fa-cubes"></i>
        </div>
        <h1>SIMS</h1>
        <div class="tagline">Stock Inventory Management System</div>

        <!-- loading animation -->
        <div class="facebook-loader">
            <div></div>
            <div></div>
            <div></div>
        </div>
        <div class="loading-text">Loading ...</div>
        <div class="hint">click anywhere to skip</div>
    </div>

    <script>
        (function() {
            // Redirect to login.html after 3 seconds
            let timeout = setTimeout(function() {
                window.location.href = 'login.html';
            }, 3000);

            // Allow user to skip by clicking anywhere
            document.getElementById('splashContainer').addEventListener('click', function() {
                clearTimeout(timeout);
                window.location.href = 'login.html';
            });
        })();
    </script>
</body>
</html>
